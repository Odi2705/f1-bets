<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>F1 Bets 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --f1-red:   #e10600;
      --f1-black: #15151e;
    }
    body { background: #f4f4f4; font-family: system-ui, -apple-system, sans-serif; }
    .f1-header { background: var(--f1-black); }
    .btn-red { background: var(--f1-red); }
    .btn-red:hover { background: #c00500; }

    /* Comparison table colors */
    .cell-exact { background: #16a34a; color: white; }
    .cell-other { background: #facc15; color: #1a1a1a; }
    .cell-wrong { background: #dc2626; color: white; }
    .cell-empty { background: #e5e7eb; color: #6b7280; }

    /* Standings colors */
    .pts-green { background: #16a34a; color: white; font-weight: bold; }
    .pts-red   { background: #dc2626; color: white; }

    /* Team driver colors */
    .team-redbull    { color: #3671C6; font-weight: 600; }
    .team-ferrari    { color: #E8002D; font-weight: 600; }
    .team-mercedes   { color: #27F4D2; font-weight: 600; }
    .team-mclaren    { color: #FF8000; font-weight: 600; }
    .team-astonmartin{ color: #229971; font-weight: 600; }
    .team-alpine     { color: #d946ef; font-weight: 600; }
    .team-sauber     { color: #52E252; font-weight: 600; }
    .team-rb         { color: #6692FF; font-weight: 600; }
    .team-haas       { color: #9ca3af; font-weight: 600; }
    .team-williams   { color: #64C4FF; font-weight: 600; }

    .nav-tab.active { color: var(--f1-red); border-bottom: 2px solid var(--f1-red); }

    /* Mobile bottom nav */
    #bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; }
    #content    { padding-bottom: 72px; }

    /* Wide table scrollable */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-scroll table { border-collapse: collapse; white-space: nowrap; }
    .table-scroll td, .table-scroll th {
      border: 1px solid #d1d5db;
      padding: 4px 6px;
      text-align: center;
      font-size: 12px;
    }
    .table-scroll th { background: #f9fafb; font-weight: 700; }
    .row-num { font-weight: 700; background: #f9fafb; }

    /* Yellow section header like Excel */
    .section-header {
      background: #FFEB00;
      color: #111;
      font-weight: 800;
      font-size: 1rem;
      text-align: center;
      padding: 6px 0;
      border: 1px solid #ccc;
    }

    /* Spinner */
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--f1-red); border-radius: 50%; width: 32px; height: 32px; animation: spin .8s linear infinite; margin: auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen">

  <!-- Top header -->
  <header class="f1-header text-white px-4 py-3 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-2">
      <span class="text-xl font-black tracking-tight">F1</span>
      <span class="text-sm font-light opacity-80">Bolão 2026</span>
    </div>
    <div id="user-badge" class="text-sm opacity-80 cursor-pointer" onclick="logout()"></div>
  </header>

  <!-- Main content -->
  <main id="content" class="max-w-2xl mx-auto"></main>

  <!-- Bottom navigation (hidden on login) -->
  <nav id="bottom-nav" class="bg-white border-t border-gray-200 hidden">
    <div class="flex justify-around max-w-2xl mx-auto">
      <button onclick="navigate('home')"      class="nav-tab flex flex-col items-center py-2 px-4 text-gray-500 text-xs gap-1 flex-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Início
      </button>
      <button onclick="navigate('apostar')"   class="nav-tab flex flex-col items-center py-2 px-4 text-gray-500 text-xs gap-1 flex-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        Apostar
      </button>
      <button onclick="navigate('resultados')" class="nav-tab flex flex-col items-center py-2 px-4 text-gray-500 text-xs gap-1 flex-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Resultados
      </button>
      <button onclick="navigate('classificacao')" class="nav-tab flex flex-col items-center py-2 px-4 text-gray-500 text-xs gap-1 flex-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>
        Pontuação
      </button>
    </div>
  </nav>

  <script src="/app.js"></script>
</body>
</html>
